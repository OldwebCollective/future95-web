<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Posts - 90's tech blog</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>

  <body>
    <div class="ie-window">
      <div class="ie-content">
        <div id="header-container"></div>

        <div class="content">
          <div class="main">
            <div id="featured-post-container"></div>

            <div id="latest-post-container"></div>

            <div id="filter-container"></div>

            <div id="posts-container"></div>
          </div>

          <div class="sidebar">
            <div id="follow-widget"></div>
            <div id="links-widget"></div>
            <div class="window">
              <div class="title-bar">QUICK LINKS</div>
              <div class="window-content">
                <p><a href="/archives.html">Browse Archives</a></p>
                <p><a href="./about.html">About US</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script src="js/app.js"></script>
<script>
  let selectedCategory = null;

  function getAllCategories() {
    const categories = new Set();
    blogData.posts.forEach(post => {
      (post.categories || []).forEach(cat => categories.add(cat));
    });
    return Array.from(categories).sort();
  }

  function renderFilterWidget() {
    const container = document.getElementById("filter-container");
    if (!container) return;

    const categories = getAllCategories();

    container.innerHTML = `
      <div class="window">
        <div class="title-bar">FILTER BY CATEGORY</div>
        <div class="window-content" style="padding: 10px;">
          <button 
            id="cat-all"
            onclick="filterByCategory(null)"
            style="padding: 5px 10px; margin: 5px; background: #c0c0c0; border: outset 2px #dfdfdf #808080; cursor: pointer; font-weight: bold;">
            All Posts (${blogData.posts.length})
          </button>
          ${categories.map(cat => {
            const count = blogData.posts.filter(p => 
              (p.categories || []).includes(cat)
            ).length;
            return `
              <button 
                id="cat-${cat}"
                onclick="filterByCategory('${cat}')"
                style="padding: 5px 10px; margin: 5px; background: #c0c0c0; border: outset 2px #dfdfdf #808080; cursor: pointer;">
                ${cat} (${count})
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `;

    updateCategoryButtonStyle();
  }

  function filterByCategory(category) {
    selectedCategory = category;
    updateCategoryButtonStyle();
    renderPostsListFiltered();
  }

  function updateCategoryButtonStyle() {
    const categories = getAllCategories();
    
    // Reset all buttons
    document.getElementById("cat-all").style.fontWeight = selectedCategory === null ? "bold" : "normal";
    
    categories.forEach(cat => {
      const btn = document.getElementById(`cat-${cat}`);
      if (btn) {
        btn.style.fontWeight = selectedCategory === cat ? "bold" : "normal";
      }
    });
  }

  function renderPostsListFiltered() {
    const container = document.getElementById("posts-container");
    if (!container) return;

    let postsToShow = blogData.posts;
    
    if (selectedCategory) {
      postsToShow = blogData.posts.filter(p => 
        (p.categories || []).includes(selectedCategory)
      );
    }

    const sortedPosts = [...postsToShow].sort((a, b) => {
      const dateA = new Date(a.date);
      const dateB = new Date(b.date);
      return dateB - dateA;
    });

    if (sortedPosts.length === 0) {
      container.innerHTML = `
        <div class="window">
          <div class="title-bar">NO POSTS</div>
          <div class="window-content">
            <p>No posts found in this category.</p>
          </div>
        </div>
      `;
      return;
    }

    const linksList = sortedPosts
      .map(
        (post) => `<li>
          <a href="post.html?id=${post.id}" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: #000080;">
            ${post.thumbnail ? `<img src="${post.thumbnail}" alt="" style="width: 40px; height: 40px; object-fit: cover; border: 1px solid #dfdfdf;">` : ''}
            <span>
              <strong>${post.title}</strong><br>
              <small style="color: #808080; font-size: 10px;">${post.date}</small><br>
              <small style="color: #0080ff; font-size: 9px;">${(post.categories || []).join(", ")}</small>
            </span>
          </a>
        </li>`,
      )
      .join("");

    container.innerHTML = `
      <div class="window-content" style="border: 2px solid; border-color: #fff #404040 #404040 #fff; padding: 10px;">
        <ul id="links-list" style="list-style: none; padding: 0; margin: 0;">
          ${linksList}
        </ul>
      </div>
    `;
  }

  document.addEventListener("DOMContentLoaded", async () => {
    const headerRes = await fetch("./components/header.html");
    document.getElementById("header-container").innerHTML =
      await headerRes.text();

    const followRes = await fetch("./components/follow-widget.html");
    document.getElementById("follow-widget").innerHTML = await followRes.text();

    const linksRes = await fetch("./components/links-widget.html");
    document.getElementById("links-widget").innerHTML = await linksRes.text();

    await initApp();
    
    renderFeaturedPost();
    renderLatestSinglePost();
    renderFilterWidget();
    renderPostsListFiltered();
  });
</script>
