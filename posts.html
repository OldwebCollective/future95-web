<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Posts - mei's tech blog</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>

  <body>
    <div class="ie-window">
      <div class="ie-content">
        <div id="header-container"></div>

        <div class="content">
          <div class="sidebar" id="sidebar-about"></div>

          <div class="main">
            <div>
              <h2>All Posts</h2>
              <p>Explore all articles from my tech blog</p>
            </div>

            <div id="posts-container"></div>
          </div>

          <div class="sidebar">
            <div id="follow-widget"></div>
            <div id="links-widget"></div>
            <div class="window">
              <div class="title-bar">QUICK LINKS</div>
              <div class="window-content">
                <p><a href="/archives.html">Browse Archives</a></p>
                <p><a href="/about.html">About Me</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script src="js/app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const headerRes = await fetch("components/header.html");
    document.getElementById("header-container").innerHTML =
      await headerRes.text();

    const aboutRes = await fetch("components/about-widget.html");
    document.getElementById("sidebar-about").innerHTML = await aboutRes.text();

    const followRes = await fetch("components/follow-widget.html");
    document.getElementById("follow-widget").innerHTML = await followRes.text();

    const linksRes = await fetch("components/links-widget.html");
    document.getElementById("links-widget").innerHTML = await linksRes.text();

    await initApp();
    renderPostsList();
  });
</script>
