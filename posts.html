<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Posts - 90's tech blog</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>

  <body>
    <!-- Loading Screen -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-window">
        <div class="loading-title-bar">⏳ CARGANDO...</div>
        <div class="loading-content">
          <p style="margin: 20px 0; text-align: center; font-size: 12px">
            Por favor espera...
          </p>
          <div class="loading-bar-container">
            <div class="loading-bar"></div>
          </div>
          <p
            style="
              text-align: center;
              font-size: 10px;
              color: #808080;
              margin-top: 10px;
            "
          >
            Inicializando aplicación...
          </p>
        </div>
      </div>
    </div>

    <div class="ie-window">
      <div class="ie-content">
        <div id="header-container"></div>

        <div class="content">
          <div class="main">
            <div id="featured-post-container"></div>

            <div id="latest-post-container"></div>

            <div id="posts-container"></div>
          </div>

          <div class="sidebar">
            <div id="follow-widget"></div>
            <div id="links-widget"></div>
            <div class="window">
              <div class="title-bar">QUICK LINKS</div>
              <div class="window-content">
                <p><a href="/archives.html">Browse Archives</a></p>
                <p><a href="./about.html">About US</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script src="js/utils.js"></script>
<script src="js/app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const headerRes = await fetch("./components/header.html");
    document.getElementById("header-container").innerHTML =
      await headerRes.text();

    const followRes = await fetch("./components/follow-widget.html");
    document.getElementById("follow-widget").innerHTML = await followRes.text();

    const linksRes = await fetch("./components/links-widget.html");
    document.getElementById("links-widget").innerHTML = await linksRes.text();

    await initApp();

    renderFeaturedPost();
    renderLatestSinglePost();
    renderPostsList();
  });
</script>
