<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>mei's tech blog</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>

  <body>
    <div class="ie-window">
      <div class="ie-content">
        <div id="header-container"></div>

        <div class="content">
          <!-- SIDEBAR LEFT -->
          <div class="sidebar" id="sidebar-about"></div>

          <!-- MAIN -->
          <div class="main">
            <div>
              <h2>Welcome to my Tech Blog!</h2>
              <p>Hi! I'm Mei, and here I share my love for all things tech.</p>
              <p>
                You'll find news, tips, and reviews on gadgets and retro
                software.
              </p>
            </div>

            <!-- Posts dinámicos -->
            <div id="posts-container"></div>
          </div>

          <!-- SIDEBAR RIGHT -->
          <div class="sidebar">
            <div id="follow-widget"></div>
            <div id="links-widget"></div>
            <div class="window">
              <div class="window-content">
                <p>12345 visitors</p>
                <p>Thanks for visiting!</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script src="js/app.js"></script>
<script>
  // Cargar componentes específicos de index
  document.addEventListener("DOMContentLoaded", async () => {
    // Cargar header
    const headerRes = await fetch("components/header.html");
    document.getElementById("header-container").innerHTML =
      await headerRes.text();

    // Cargar about widget
    const aboutRes = await fetch("components/about-widget.html");
    document.getElementById("sidebar-about").innerHTML = await aboutRes.text();

    // Cargar follow widget
    const followRes = await fetch("components/follow-widget.html");
    document.getElementById("follow-widget").innerHTML = await followRes.text();

    // Cargar links widget
    const linksRes = await fetch("components/links-widget.html");
    document.getElementById("links-widget").innerHTML = await linksRes.text();

    // Ahora cargar data y renderizar
    await initApp();
    renderPostsList();
  });
</script>
