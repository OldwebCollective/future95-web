<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Future in '95</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>

  <body>
    <!-- Loading Screen -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-window">
        <div class="title-bar">⏳ CARGANDO...</div>
        <div class="loading-content">
          <p style="margin: 20px 0; text-align: center; font-size: 12px">
            Por favor espera...
          </p>
          <div class="loading-bar-container">
            <div class="loading-bar"></div>
          </div>
          <p
            style="
              text-align: center;
              font-size: 10px;
              color: #808080;
              margin-top: 10px;
            "
          >
            Inicializando aplicación...
          </p>
        </div>
      </div>
    </div>

    <div class="ie-window">
      <div class="ie-content">
        <div id="header-container"></div>

        <div class="content">
          <div class="sidebar">
            <div id="sidebar-about"></div>
            <div id="webmaster-status-widget"></div>
            <div id="follow-widget"></div>
          </div>

          <div class="main">
            <div id="featured-post-container"></div>

            <div class="posts-and-widgets">
              <div id="posts-container" class="latest-posts-section"></div>

              <div class="sidebar right-sidebar">
                <div id="site-info-widget"></div>
                <div id="follow-widget"></div>
                <div id="links-widget"></div>
                <div id="visitors-widget"></div>
              </div>
            </div>
          </div>
        </div>
        <div id="desktop-area-widget"></div>
      </div>
    </div>
  </body>
</html>

<script src="js/app.js"></script>
<script src="js/utils.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const headerRes = await fetch("./components/header.html");
    document.getElementById("header-container").innerHTML =
      await headerRes.text();

    const aboutRes = await fetch("./components/about-widget.html");
    document.getElementById("sidebar-about").innerHTML = await aboutRes.text();

    const followRes = await fetch("./components/follow-widget.html");
    document.getElementById("follow-widget").innerHTML = await followRes.text();

    const linksRes = await fetch("./components/links-widget.html");
    document.getElementById("links-widget").innerHTML = await linksRes.text();

    const siteInfoRes = await fetch("./components/site-info.html");
    document.getElementById("site-info-widget").innerHTML =
      await siteInfoRes.text();

    const visitorsRes = await fetch("./components/visitors-widget.html");
    document.getElementById("visitors-widget").innerHTML =
      await visitorsRes.text();

    const desktopAreaRes = await fetch("./components/desktop-area-widget.html");
    document.getElementById("desktop-area-widget").innerHTML =
      await desktopAreaRes.text();

    const webmasterStatusRes = await fetch(
      "./components/webmaster-status-widget.html",
    );
    document.getElementById("webmaster-status-widget").innerHTML =
      await webmasterStatusRes.text();

    await initApp();
    renderFeaturedPost();
    renderLatestPostsHome();
    renderRandomPost();
    renderLatestExperiment();
  });
</script>
