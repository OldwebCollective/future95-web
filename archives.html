<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Archives - 90's tech blog</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>

  <body>
    <!-- Loading Screen -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-window">
        <div class="loading-title-bar">⏳ CARGANDO...</div>
        <div class="loading-content">
          <p style="margin: 20px 0; text-align: center; font-size: 12px;">Por favor espera...</p>
          <div class="loading-bar-container">
            <div class="loading-bar"></div>
          </div>
          <p style="text-align: center; font-size: 10px; color: #808080; margin-top: 10px;">Cargando archivos...</p>
        </div>
      </div>
    </div>

    <div class="ie-window">
      <div class="ie-content">
        <div id="header-container"></div>
        <div class="content">
          <div class="sidebar" id="sidebar-about"></div>
          <p>🚧 Site under construction 🚧</p>
        </div>
      </div>
    </div>
  </body>
</html>

<script src="js/app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const headerRes = await fetch("./components/header.html");
    document.getElementById("header-container").innerHTML =
      await headerRes.text();

    await initApp();
  });
</script>
