<div class="desktop-area">
  <!-- Row 1 -->
  <div class="window">
    <div class="title-bar">NOW PLAYING</div>
    <div class="window-content">
      <p id="track">▶ Nothing playing</p>

      <button class="music-button" onclick="prevTrack()" style="margin-left: 5px">⏮</button>
      <button class="music-button" onclick="playMusic()">▶</button>
      <button class="music-button" onclick="pauseMusic()">⏸</button>
      <button class="music-button" onclick="nextTrack()" style="margin-left: 5px">⏭</button>

      <div style="margin-top: 10px; font-size: 10px; color: #808080">
        <p id="track-info" style="margin: 3px 0">Track 1 of 5</p>
      </div>
    </div>
  </div>

  <!-- Audio -->
  <audio id="audio-player" src="./assets/audio/o95.wav"></audio>

  <!-- Row 2 -->
  <div class="window">
    <div class="title-bar">RANDOM POST</div>
    <div class="window-content" id="random-post"></div>
  </div>

  <!-- Row 3 (full width) -->
  <div class="window full-width">
    <div class="title-bar">LATEST EXPERIMENT</div>
    <div class="window-content" id="latest-experiment"></div>
  </div>
</div>
