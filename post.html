<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Post - mei's tech blog</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>

  <body>
    <div class="ie-window">
      <div class="ie-content">
        <div id="header-container"></div>

        <div class="layout">
          <!-- MAIN CONTENT -->
          <div class="post-content">
            <!-- TITLE WINDOW -->
            <div id="post-header" class="window">
              <div class="title-bar" id="post-title-bar">Loading...</div>
              <div class="window-content" id="post-meta"></div>
            </div>

            <!-- POST CONTENT -->
            <div id="post-body"></div>
          </div>

          <!-- SIDEBAR -->
          <div class="sidebar">
            <!-- RELATED POSTS -->
            <div class="window">
              <div class="title-bar">RELATED POSTS</div>
              <div class="window-content" id="related-posts"></div>
            </div>

            <!-- COOL LINKS -->
            <div id="links-widget"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
    
    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const headerRes = await fetch("components/header.html");
        document.getElementById("header-container").innerHTML = await headerRes.text();

        const linksRes = await fetch("components/links-widget.html");
        document.getElementById("links-widget").innerHTML = await linksRes.text();

        await initApp();

        const params = new URLSearchParams(window.location.search);
        const postId = params.get("id");

        if (!postId) {
          document.getElementById("post-body").innerHTML =
            '<p>Post not found.</p>';
          return;
        }

        const post = blogData.posts.find((p) => p.id === postId);

        if (!post) {
          document.getElementById("post-body").innerHTML =
            '<p>Post not found.</p>';
          return;
        }

        await renderPost(post);

        renderRelatedPosts(postId);
      });

      async function renderPost(post) {
        document.getElementById("post-title-bar").textContent = post.title;
        document.title = `${post.title} - mei's tech blog`;

        document.getElementById("post-meta").innerHTML = `<p><b>By Mei</b> - ${post.date}</p>`;

        try {
          const mdRes = await fetch(`/posts/${post.id}.md`);
          if (!mdRes.ok) {
            document.getElementById("post-body").innerHTML = '<p>Post content not found.</p>';
            return;
          }

          const mdContent = await mdRes.text();
          
          const converter = new showdown.Converter({
            tables: true,
            strikethrough: true,
            tasklists: true,
            smoothLivePreview: true
          });
          
          const htmlContent = converter.makeHtml(mdContent);
          
          document.getElementById("post-body").innerHTML = htmlContent;
          
          const tables = document.querySelectorAll('#post-body table');
          tables.forEach(table => {
            table.className = 'window';
          });
          
        } catch (error) {
          console.error('Error loading post:', error);
          document.getElementById("post-body").innerHTML = 
            '<p>Error loading post content. The markdown file may not exist.</p>';
        }
      }
    </script>
  </body>
</html>
