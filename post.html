<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Post - 90's tech blog</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>

  <body>
    <!-- Loading Screen -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-window">
        <div class="loading-title-bar">⏳ CARGANDO...</div>
        <div class="loading-content">
          <p style="margin: 20px 0; text-align: center; font-size: 12px;">Por favor espera...</p>
          <div class="loading-bar-container">
            <div class="loading-bar"></div>
          </div>
          <p style="text-align: center; font-size: 10px; color: #808080; margin-top: 10px;">Cargando post...</p>
        </div>
      </div>
    </div>

    <div class="ie-window">
      <div class="ie-content">
        <div id="header-container"></div>

        <div class="layout">
          <div class="post-content">
            <div id="post-header" class="window">
              <div class="title-bar" id="post-title-bar">Loading...</div>
              <div class="window-content" id="post-meta"></div>
            </div>

            <div id="post-body"></div>
          </div>

          <div class="sidebar">
            <div class="window">
              <div class="title-bar">RELATED POSTS</div>
              <div class="window-content" id="related-posts"></div>
            </div>

            <div id="links-widget"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>

    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const headerRes = await fetch("./components/header.html");
        document.getElementById("header-container").innerHTML =
          await headerRes.text();

        const linksRes = await fetch("./components/links-widget.html");
        document.getElementById("links-widget").innerHTML =
          await linksRes.text();

        await initApp();

        const params = new URLSearchParams(window.location.search);
        const postId = params.get("id");

        if (!postId) {
          document.getElementById("post-body").innerHTML =
            "<p>Post not found.</p>";
          return;
        }

        const post = blogData.posts.find((p) => p.id === postId);

        if (!post) {
          document.getElementById("post-body").innerHTML =
            "<p>Post not found.</p>";
          return;
        }

        await renderPost(post);

        renderRelatedPosts(postId);
      });

      async function renderPost(post) {
        document.getElementById("post-title-bar").textContent = post.title;
        document.title = `${post.title} - mei's tech blog`;

        try {
          const mdRes = await fetch(`./posts/${post.id}.md`);
          if (!mdRes.ok) {
            document.getElementById("post-body").innerHTML =
              "<p>Post content not found.</p>";
            return;
          }

          const mdContent = await mdRes.text();

          // Parsear front-matter
          const { metadata, content } = parseFrontMatter(mdContent);

          // Usar metadata del front-matter o fallback a data.json
          const postMeta = {
            author: metadata.author || 'Editor',
            date: metadata.displayDate || formatDate(post.date),
            ...metadata
          };

          document.getElementById("post-meta").innerHTML =
            `<p><b>By ${postMeta.author || 'Editor'}</b> - ${postMeta.date}</p>`;

          const converter = new showdown.Converter({
            tables: true,
            strikethrough: true,
            tasklists: true,
            smoothLivePreview: true,
            simpleLineBreaks: true,
            ghCompatibleHeaderId: true,
            openLinksInNewWindow: true,
            parseImgDimensions: true,
            literalMidWordUnderscores: true,
          });

          const htmlContent = converter.makeHtml(content);

          document.getElementById("post-body").innerHTML = htmlContent;

          setTimeout(() => {
            const images = document.querySelectorAll("#post-body img");
            images.forEach((img) => {
              img.style.maxWidth = "100%";
              img.style.height = "auto";
              img.style.border = "1px solid #808080";
              img.style.margin = "10px 0";
              img.loading = "lazy";
            });
          }, 100);

          const tables = document.querySelectorAll("#post-body table");
          tables.forEach((table) => {
            table.className = "window";
          });
        } catch (error) {
          console.error("Error:", error);
          document.getElementById("post-body").innerHTML = `
      <div class="window">
        <div class="title-bar">ERROR</div>
        <div class="window-content">
          <p>❌ No se pudo cargar el post: ${error.message}</p>
          <p><a href="./posts.html">← Volver al listado</a></p>
        </div>
      </div>
    `;
        }
      }
    </script>
  </body>
</html>
