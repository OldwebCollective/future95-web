<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - Future in '95</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    a {
      color: #00FFFF;
      text-decoration: underline;
    }

    a:visited {
      color: #FF00FF;
    }

    a:hover {
      background-color: #FFFF00;
      color: #000080;
    }

    hr {
      border: 2px solid #000080;
    }

    #post-body {
      line-height: 1.6;
    }

    #post-body img {
      max-width: 90%;
      border: 1px solid #808080;
    }

    .related-post {
      border: 1px solid #444;
      padding: 8px;
      margin: 5px 0;
      background: #0a0a1a;
    }

    .related-post a {
      color: #00FFFF;
    }
  </style>
</head>

<body background="./assets/img/textures/galaga.webp" bgcolor="#000000" text="#FFFFFF" link="#00FFFF" vlink="#FF00FF">

  <center>

    <table border="4" cellpadding="8" cellspacing="0" width="100%" style="max-width: 760px;" bgcolor="#000000">
      <tr>
        <td>

          <!-- HEADER -->
          <center>
            <h2 id="post-title-display">Loading...</h2>
          </center>

          <hr>

          <!-- NAVEGACION -->
          <center>
            <a href="./index.html">[ HOME ]</a> |
            <a href="./posts.html">[ POSTS ]</a> |
            <a href="./archives.html">[ ARCHIVES ]</a> |
            <a href="./about.html">[ ABOUT ]</a>
          </center>

          <hr>

          <!-- POST META -->
          <div id="post-meta" style="text-align: center; font-size: 12px; color: #CCCCCC;"></div>

          <hr>

          <!-- POST CONTENT -->
          <div id="post-body"></div>

          <hr>

          <!-- RELATED POSTS -->
          <center><b>RELATED POSTS</b></center>
          <div id="related-posts">
            <p><i>No related posts</i></p>
          </div>

          <hr>

          <!-- FOOTER -->
          <center>
            <small>
              © 1995-2026 <b>FUTURE IN '95</b><br>
              <a href="./index.html">Volver a Home</a> • <a href="./archives.html">Volver a Archives</a><br>
              Se ve mejor en Internet Explorer on 800x600
            </small>
          </center>

        </td>
      </tr>
    </table>

  </center>

</body>

</html>

<script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    await initApp();

    const params = new URLSearchParams(window.location.search);
    const postId = params.get("id");

    if (!postId) {
      document.getElementById("post-body").innerHTML = "<p>Post not found.</p>";
      return;
    }

    const post = blogData.posts.find((p) => p.id === postId);

    if (!post) {
      document.getElementById("post-body").innerHTML = "<p>Post not found.</p>";
      return;
    }

    await renderPost(post);
    renderRelatedPosts(postId);
  });

  async function renderPost(post) {
    document.getElementById("post-title-display").textContent = post.title;
    document.title = `${post.title} - Future in '95`;
    document.getElementById("post-meta").innerHTML = `<p><b>By ${post.editor}</b> - ${formatDate(post.date)}</p>`;

    try {
      const mdRes = await fetch(`./posts/${post.id}.md`);
      if (!mdRes.ok) {
        document.getElementById("post-body").innerHTML = "<p>Post content not found.</p>";
        return;
      }

      const mdContent = await mdRes.text();
      const converter = new showdown.Converter({
        tables: true,
        strikethrough: true,
        tasklists: true,
        smoothLivePreview: true,
        simpleLineBreaks: true,
      });

      const htmlContent = converter.makeHtml(mdContent);
      document.getElementById("post-body").innerHTML = htmlContent;
    } catch (error) {
      document.getElementById("post-body").innerHTML = `<p>Error loading post: ${error.message}</p>`;
    }
  }
</script>
</body>

</html>
